// シナリオ生成
function generateScenario() {
  const transit = document.getElementById("transit").value;
  if (!transit) return;

  const list = airports[transit];
  const selected = list[Math.floor(Math.random() * list.length)];

  document.getElementById("airport").innerHTML =
  selected.name +
  ' <img src="' + selected.flag + '" width="20" style="vertical-align:middle;"> ' +
  selected.country;
  document.getElementById("airport").dataset.type = selected.type;
  document.getElementById("airport").dataset.china = selected.china ? "true" : "false";
  
  // 最終目的地（空港ランダム）
const finalCode = selected.finals[Math.floor(Math.random() * selected.finals.length)];

const listFinal = finalAirports[finalCode];

// 同じ都市を除外
const filteredFinals = listFinal.filter(f => !selected.name.includes(f.city.split("（")[0]));

// 保険（全部消えたら元に戻す）
const usableFinals = filteredFinals.length > 0 ? filteredFinals : listFinal;

// ランダム選択
const selectedFinal = usableFinals[Math.floor(Math.random() * usableFinals.length)];
document.getElementById("final").innerHTML =
  selectedFinal.city +
  ' <img src="' + selectedFinal.flag + '" width="20" style="vertical-align:middle;"> ' +
  selectedFinal.country;

// 判定用
document.getElementById("final").dataset.value = finalCode;
document.getElementById("final").dataset.country = selectedFinal.country;
}

// 判定ロジック（優先順位あり）
function getCorrectAnswers(type, final) {

  let q1, q2, explanation;

  // Q1：乗り継ぎ空港
  if (type === "ok") q1 = "ok";
  else if (type === "ng") q1 = "ng";
  else q1 = "conditional";

  // Q2（最終目的地）
  if (type === "ok") {
    q2 = "ok";
    explanation = "STEBsの使用は可能です。";
  }

  else if (type === "ng") {
    q2 = "ng";
    explanation = "STEBsは使用できません。乗り継ぎ空港でスーツケースに液体物を入れ、預け直すことが可能か確認してください。";
  }

  else { // conditional

  const country = document.getElementById("final").dataset.country;
  const isChinaTransit = document.getElementById("airport").dataset.china === "true";
  const isSingaporeTransit =
    document.getElementById("transit").value === "SINGAPORE";

  // ① 中国で入国 → NG
  if (isChinaTransit) {
    q2 = "ng";
    explanation = "中国で入国する場合、STEBsは使用できません。";
  }

  // ② アメリカ・オーストラリア → NG
  else if (country === "アメリカ" || country === "オーストラリア") {
    q2 = "ng";
    explanation = "アメリカ・オーストラリアが最終目的地の場合、STEBsは使用できません。乗り継ぎ空港でスーツケースに液体物を入れ、預け直すことが可能か確認してください。";
  }

  // ③ シンガポール経由（別ルール）
  else if (isSingaporeTransit) {

    if (SG_NG_COUNTRIES.includes(country)) {
      q2 = "ng";
      explanation = "STEBsは使用できません。シンガポールでスーツケースに液体物を入れ、預け直すことが可能か確認してください。";
    } else {
      q2 = "ok";
      explanation = "STEBsの使用は可能です。";
    }

  }

  // ④ その他 → OK
  else {
    q2 = "ok";
    explanation = "STEBsの使用は可能です。";
  }
}
  return { q1, q2, explanation };
}

// 判定
function check() {
  const type = document.getElementById("airport").dataset.type;
  const final = document.getElementById("final").dataset.value;

  const user1 = document.getElementById("answer1").value;
  const user2 = document.getElementById("answer2").value;

  if (!type || !final || !user1 || !user2) {
    alert("すべて選択してください");
    return;
  }

  const correct = getCorrectAnswers(type, final);

  let resultText = "";

  if (user1 === correct.q1 && user2 === correct.q2) {
    resultText = "⭕ 正解！";
  } else {
    resultText = "❌ 不正解";
  }

  document.getElementById("result").innerText = resultText;
  document.getElementById("explanation").innerText = correct.explanation;

}
